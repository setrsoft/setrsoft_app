# Local development: db + Django runserver + Vite (npm run dev in ./frontend).
# Production frontend is not defined here yet (see docker-compose.prod.yml).
services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-setrsoft}
      POSTGRES_USER: ${POSTGRES_USER:-setrsoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-setrsoft} -d ${POSTGRES_DB:-setrsoft}"]
      interval: 2s
      timeout: 3s
      retries: 6

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["sh", "-c", "python manage.py migrate && python manage.py sync_holds --if-empty && python manage.py runserver 0.0.0.0:8000"]
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-setrsoft}
      POSTGRES_USER: ${POSTGRES_USER:-setrsoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1},backend
      TRUST_PROXY: ${TRUST_PROXY:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
      VITE_API_BASE: /api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command:
      [
        "sh",
        "-c",
        "[ -d node_modules/.bin ] || npm ci --verbose && npm run dev -- --host 0.0.0.0 --port 5173",
      ]
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
