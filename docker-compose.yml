# Local development: db + Django runserver + Vite (npm run dev in ./frontend).
# Production frontend is not defined here yet (see docker-compose.prod.yml).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-setrsoft}
      POSTGRES_USER: ${POSTGRES_USER:-setrsoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-setrsoft} -d ${POSTGRES_DB:-setrsoft}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-setrsoft}
      POSTGRES_USER: ${POSTGRES_USER:-setrsoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command:
      [
        "sh",
        "-c",
        "npm ci && npm run dev -- --host 0.0.0.0 --port 5173",
      ]
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
