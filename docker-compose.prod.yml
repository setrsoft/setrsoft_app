services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-setrsoft}
      POSTGRES_USER: ${POSTGRES_USER:-setrsoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-setrsoft} -d ${POSTGRES_DB:-setrsoft}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal_bridge

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "${PORT_BACKEND:-8000}"
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-setrsoft}
      POSTGRES_USER: ${POSTGRES_USER:-setrsoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://${SERVER_IP}}
      TRUST_PROXY: ${TRUST_PROXY:-1}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal_bridge

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=/api
        - VITE_PUBLIC_POSTHOG_PROJECT_TOKEN=${VITE_PUBLIC_POSTHOG_PROJECT_TOKEN:-}
        - VITE_PUBLIC_POSTHOG_HOST=${VITE_PUBLIC_POSTHOG_HOST:-}
    container_name: setrsoft-frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.setrsoft-web.rule=Host(`${SERVER_IP}`)"
      - "traefik.http.routers.setrsoft-web.entrypoints=web"
      - "traefik.http.routers.setrsoft-web.service=setrsoft-web-service"
      - "traefik.http.services.setrsoft-web-service.loadbalancer.server.port=80"
      - "traefik.http.routers.setrsoft-web.priority=100"
    depends_on:
      - backend
    networks:
      - internal_bridge
      - public_gateway

volumes:
  postgres_data_prod:

networks:
  internal_bridge:
    driver: bridge
  public_gateway:
    external: true
    name: ${DOCKER_NETWORK_NAME:-default}